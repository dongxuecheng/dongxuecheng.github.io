name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - source  # 当 'source' 分支有推送时触发
  workflow_dispatch: # 允许手动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.147.4 # 指定一个较新的 Hugo Extended 版本
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 拉取主题等 Git Submodule
          fetch-depth: 0       # 获取所有历史记录，以便 .Lastmod 等功能正常工作

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '${{ env.HUGO_VERSION }}'
          extended: true # 必须为 PaperMod 使用 extended 版本

      - name: Build Hugo site
        run: hugo --minify # 构建网站，--minify 压缩输出

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public # Hugo 生成的静态文件默认在 public 目录

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4